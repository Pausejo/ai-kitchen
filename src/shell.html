<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI KITCHEN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
    <style>
      :root {
        --paper: #ece4d0;
        --paper2: #e2d8bd;
        --ink: #1a1611;
        --ink2: #2c2620;
        --accent: #c2410c;
        --muted: #6b6358;
        --line: #c4baa0;
        --ok: #4a6b2c;
        --warn: #a88410;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: "JetBrains Mono", monospace;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-image:
          radial-gradient(ellipse at 20% 30%, rgba(0, 0, 0, 0.022) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 70%, rgba(0, 0, 0, 0.028) 0%, transparent 55%);
      }
      #game {
        width: min(100vw, calc(100vh * 1.6));
        height: min(100vh, calc(100vw / 1.6));
        display: block;
        image-rendering: -webkit-optimize-contrast;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--paper);
        font-size: 11px;
        letter-spacing: 0.3em;
        color: var(--muted);
        z-index: 10;
      }
      #loading.gone {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">CARGANDO · LOADING · 載入中</div>
    <canvas id="game" width="1280" height="800"></canvas>
    __SCRIPT__
  </body>
</html>
